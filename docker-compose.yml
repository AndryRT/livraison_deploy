services:
  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development

  backend-django:
    build:
      context: ./backend/livraison
    volumes:
      - ./backend/livraison:/app
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  backend-fastapi:
    build:
      context: ./backend/match_position
    volumes:
      - ./backend/match_position:/app
    ports:
      - "8001:8001"
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  reporting-worker:
    build:
      context: ./backend/match_position
    volumes:
      - ./backend/match_position:/app
    command: python reporting/schedule_request.py
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express:latest
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
    depends_on:
      - mongodb

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend-django
      - backend-fastapi

volumes:
  mongodb_data:
