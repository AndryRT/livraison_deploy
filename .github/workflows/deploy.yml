name: CD - Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          cd ~/livraison_deploy
          git pull origin main
          docker compose down
          docker compose build --no-cache
          docker compose up -d
