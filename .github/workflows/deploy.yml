name: CD - Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/livraison
            git pull origin main
            cd backend/livraison && source venv/bin/activate && pip install -r requirements.txt && python manage.py migrate && deactivate
            cd /opt/livraison/frontend && npm ci && npm run build
            sudo systemctl restart livraison-backend || sudo service livraison-backend restart || true
            sudo systemctl restart livraison-frontend || sudo service livraison-frontend restart || true
